<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>캠스 자동화 도구</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  background: #111;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.header {
  background: #1c1c1e;
  border-bottom: 1px solid #2c2c2e;
  flex-shrink: 0;
}

.header-top {
  padding: 8px 16px 0;
  font-size: 11px;
  font-weight: 600;
  color: #636366;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.tab-bar {
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}

.tab-bar::-webkit-scrollbar { display: none; }

.tab {
  flex-shrink: 0;
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 500;
  color: #636366;
  cursor: pointer;
  border-bottom: 2.5px solid transparent;
  white-space: nowrap;
  transition: color 0.15s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

.tab.active {
  color: #fff;
  border-bottom-color: #0a84ff;
}

.tab:active { opacity: 0.7; }

.content {
  flex: 1;
  position: relative;
  background: #0a0a0a;
}

iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
  display: none;
  background: #0a0a0a;
}

iframe.active { display: block; }

.pin-overlay {
  position: absolute;
  inset: 0;
  background: #111;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  z-index: 100;
}
.pin-overlay h2 { color: #fff; font-size: 16px; font-weight: 500; }
.pin-dots { display: flex; gap: 14px; }
.pin-dot { width: 14px; height: 14px; border-radius: 50%; background: #3a3a3c; transition: background 0.15s; }
.pin-dot.filled { background: #0a84ff; }
.pin-pad { display: grid; grid-template-columns: repeat(3, 72px); gap: 12px; }
.pin-btn {
  height: 72px; border-radius: 50%; background: #2c2c2e; border: none;
  color: #fff; font-size: 22px; font-weight: 400; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.pin-btn:active { background: #48484a; }
.pin-btn.del { font-size: 18px; }
.pin-err { color: #ff453a; font-size: 13px; min-height: 18px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">CAMS 자동화</div>
  <div class="tab-bar" id="tabBar"></div>
</div>
<div class="content" id="content"></div>

<script>
const BASE = 'https://ghksrl10-cpu.github.io';

const TOOLS = [
  { name: '홈',        src: 'dashboard.html', home: true },
  { name: '토크 측정',  src: BASE + '/cams-torque/' },
  { name: '토크 관리',  src: '토크관리/index.html' },
  { name: '대차 관리',  src: BASE + '/cams-cart-mgmt/' },
  { name: '3정5S',     src: '라인 3정5S/index.html' },
  { name: '알카 KPI',  src: '알카_실적종합.html' },
  { name: 'ALC 정리',  src: 'ALC정리.html' },
  { name: '컨베어',    src: BASE + '/cams-conveyor-sim/' },
  { name: '업무일지',  src: '업무일지_웹.html', pin: true },
  { name: 'PPTX 캡처', src: 'pptx캡처/index.html', pin: true },
];

const PIN = '5270';
const SESSION_KEY = 'cams_pin_ok';
const tabBar = document.getElementById('tabBar');
const content = document.getElementById('content');
let activeIdx = 0;

TOOLS.forEach((tool, i) => {
  const tab = document.createElement('div');
  tab.className = 'tab' + (i === 0 ? ' active' : '');
  tab.textContent = tool.name;
  tab.addEventListener('click', () => activate(i));
  tabBar.appendChild(tab);

  const frame = document.createElement('iframe');
  frame.className = i === 0 ? 'active' : '';
  frame.dataset.src = tool.src;
  if (i === 0) frame.src = tool.src;
  content.appendChild(frame);
});

function showPin(onSuccess) {
  const ov = document.createElement('div');
  ov.className = 'pin-overlay';
  let entered = '';

  ov.innerHTML = `
    <h2>🔒 본인 확인</h2>
    <div class="pin-dots">
      ${[0,1,2,3].map(()=>`<div class="pin-dot"></div>`).join('')}
    </div>
    <div class="pin-err" id="pinErr"></div>
    <div class="pin-pad">
      ${[1,2,3,4,5,6,7,8,9,'','0','⌫'].map(k=>`<button class="pin-btn${k==='⌫'?' del':''}" data-k="${k}">${k}</button>`).join('')}
    </div>`;

  content.appendChild(ov);

  function updateDots() {
    ov.querySelectorAll('.pin-dot').forEach((d,i) => d.classList.toggle('filled', i < entered.length));
  }

  ov.addEventListener('click', e => {
    const k = e.target.dataset.k;
    if (k === undefined) return;
    if (k === '⌫') { entered = entered.slice(0,-1); }
    else if (k !== '' && entered.length < 4) { entered += k; }
    updateDots();
    if (entered.length === 4) {
      if (entered === PIN) {
        sessionStorage.setItem(SESSION_KEY, '1');
        ov.remove();
        onSuccess();
      } else {
        ov.querySelector('#pinErr').textContent = '비밀번호가 틀렸어요';
        entered = '';
        updateDots();
      }
    }
  });
}

function activate(idx) {
  if (idx === activeIdx) return;
  const tool = TOOLS[idx];
  if (tool.pin && sessionStorage.getItem(SESSION_KEY) !== '1') {
    showPin(() => doActivate(idx));
    return;
  }
  doActivate(idx);
}

window.addEventListener('message', e => {
  if (!e.data) return;
  if (e.data.type === 'cams_goto') doActivate(e.data.idx + 1);
  if (e.data.type === 'cams_torque_stat') {
    const frames = content.querySelectorAll('iframe');
    frames[0].contentWindow && frames[0].contentWindow.postMessage(e.data, '*');
  }
  if (e.data.type === 'cams_request_stat') {
    const torqueFrame = content.querySelectorAll('iframe')[1];
    if (torqueFrame && torqueFrame.src) {
      torqueFrame.contentWindow && torqueFrame.contentWindow.postMessage({ type: 'cams_request_stat' }, '*');
    }
  }
});

function doActivate(idx) {
  const tabs = tabBar.querySelectorAll('.tab');
  const frames = content.querySelectorAll('iframe');
  tabs[activeIdx].classList.remove('active');
  frames[activeIdx].classList.remove('active');
  activeIdx = idx;
  tabs[idx].classList.add('active');
  frames[idx].classList.add('active');
  if (!frames[idx].src || frames[idx].src === location.href) {
    frames[idx].src = frames[idx].dataset.src;
  }
  tabs[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}
</script>
</body>
</html>
