<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>캠스 생산팀 조립 자동화</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  background: #111;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.header {
  background: #12141f;
  border-bottom: 1px solid #1e2235;
  flex-shrink: 0;
}

.header-top {
  padding: 10px 16px 0;
  display: flex;
  align-items: center;
  gap: 9px;
}

.logo-mark {
  width: 26px;
  height: 26px;
  background: #2563eb;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -0.5px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.logo-name {
  font-size: 13px;
  font-weight: 700;
  color: #e2e4f0;
  letter-spacing: 0.5px;
}

.logo-sub {
  font-size: 10px;
  color: #4a5180;
  letter-spacing: 0.3px;
}

.tab-bar {
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}

.tab-bar::-webkit-scrollbar { display: none; }

.tab {
  flex-shrink: 0;
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 500;
  color: #636366;
  cursor: pointer;
  border-bottom: 2.5px solid transparent;
  white-space: nowrap;
  transition: color 0.15s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

.tab.active {
  color: #fff;
  border-bottom-color: #0a84ff;
}

.tab:active { opacity: 0.7; }

.content {
  flex: 1;
  position: relative;
  background: #0a0a0a;
}

iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
  display: none;
  background: #0a0a0a;
}

iframe.active { display: block; }

#loginOverlay {
  position: fixed; inset: 0; z-index: 9999;
  background: #111;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.login-box {
  background: #2c2c2e; border-radius: 16px;
  padding: 32px 28px; width: 300px;
  display: flex; flex-direction: column; gap: 14px;
}
.login-box h2 { color: #fff; font-size: 17px; font-weight: 600; text-align: center; }
.login-box input {
  width: 100%; padding: 12px 14px; border-radius: 10px;
  border: 1px solid #3a3a3c; background: #1c1c1e;
  color: #fff; font-size: 15px; outline: none;
}
.login-box input:focus { border-color: #0a84ff; }
.login-box button {
  width: 100%; padding: 13px; border-radius: 10px;
  background: #0a84ff; border: none; color: #fff;
  font-size: 15px; font-weight: 600; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.login-box button:active { background: #0060df; }
#loginErr { color: #ff453a; font-size: 13px; text-align: center; min-height: 18px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <svg viewBox="0 0 100 100" width="32" height="32" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
      <defs><clipPath id="cc"><circle cx="50" cy="50" r="49"/></clipPath></defs>
      <circle cx="50" cy="50" r="49" fill="#111"/>
      <rect x="0" y="36" width="100" height="28" fill="#dd0000" clip-path="url(#cc)"/>
      <text x="91" y="58" text-anchor="end" fill="white" font-family="Arial Black,Impact,sans-serif" font-weight="900" font-size="24" letter-spacing="-1">AMS</text>
      <path d="M 81 19 A 44 44 0 1 0 81 81" fill="none" stroke="#1414cc" stroke-width="15" stroke-linecap="round"/>
    </svg>
    <div class="logo-text">
      <div class="logo-name">CAMS</div>
      <div class="logo-sub">생산팀 조립 자동화</div>
    </div>
  </div>
  <div class="tab-bar" id="tabBar"></div>
</div>
<div id="loginOverlay">
  <div class="login-box">
    <h2>🏭 캠스 자동화 도구</h2>
    <input id="loginId" type="text" inputmode="numeric" placeholder="사번" maxlength="10" autocomplete="off">
    <input id="loginPw" type="password" placeholder="비밀번호" autocomplete="off">
    <div id="loginErr"></div>
    <button id="loginBtn" onclick="doLogin()">로그인</button>
  </div>
</div>
<div class="content" id="content"></div>

<script>
const BASE = 'https://ghksrl10-cpu.github.io';
const AUTH_KEY = 'cams_auth';
const ADMIN_ID = '103518';
const AUTH_EXP = 8 * 60 * 60 * 1000;
const PIN = '5270';

function getAuth() {
  try {
    const a = JSON.parse(localStorage.getItem(AUTH_KEY) || '');
    if (a && a.exp > Date.now()) return a;
  } catch(e) {}
  return null;
}

async function doLogin() {
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  const err = document.getElementById('loginErr');
  const btn = document.getElementById('loginBtn');
  if (!id || !pw) { err.textContent = '사번과 비밀번호를 입력하세요.'; return; }
  if (id === ADMIN_ID && pw === PIN) {
    localStorage.setItem(AUTH_KEY, JSON.stringify({ id: ADMIN_ID, name: '김환기', dept: '조립팀', exp: Date.now() + AUTH_EXP }));
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('loginId').value = '';
    document.getElementById('loginPw').value = '';
    return;
  }
  btn.disabled = true; btn.textContent = '확인 중…'; err.textContent = '';
  try {
    const res = await fetch(ERP_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': ERP_KEY },
      body: JSON.stringify({ employeeId: id, password: pw })
    });
    const data = await res.json();
    if (data.authenticated) {
      localStorage.setItem(AUTH_KEY, JSON.stringify({
        id: data.employee.employeeId,
        name: data.employee.name,
        dept: data.employee.department,
        exp: Date.now() + AUTH_EXP
      }));
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('loginId').value = '';
      document.getElementById('loginPw').value = '';
    } else {
      err.textContent = data.message || '로그인 실패';
    }
  } catch(e) {
    err.textContent = '서버 연결 오류';
  }
  btn.disabled = false; btn.textContent = '로그인';
}

document.addEventListener('DOMContentLoaded', () => {
  if (getAuth()) document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('loginPw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('loginId').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginPw').focus(); });
});

const TOOLS = [
  { name: '홈',        src: 'dashboard.html', home: true },
  { name: '토크 측정',  src: BASE + '/cams-torque/' },
  { name: '토크 관리',  src: '토크관리/index.html' },
  { name: '대차 관리',  src: BASE + '/cams-cart-mgmt/' },
  { name: '3정5S',     src: '라인 3정5S/index.html' },
  { name: '알카 KPI',  src: '알카_실적종합.html' },
  { name: 'ALC 정리',  src: 'ALC정리.html' },
  { name: '컨베어',    src: BASE + '/cams-conveyor-sim/' },
  { name: '업무일지',  src: '업무일지_웹.html', admin: true },
  { name: 'PPTX 캡처', src: 'pptx캡처/index.html', admin: true },
];

const tabBar = document.getElementById('tabBar');
const content = document.getElementById('content');
let activeIdx = 0;

TOOLS.forEach((tool, i) => {
  const tab = document.createElement('div');
  tab.className = 'tab' + (i === 0 ? ' active' : '');
  tab.textContent = tool.name;
  tab.addEventListener('click', () => activate(i));
  tabBar.appendChild(tab);

  const frame = document.createElement('iframe');
  frame.className = i === 0 ? 'active' : '';
  frame.dataset.src = tool.src;
  if (i === 0) frame.src = tool.src;
  content.appendChild(frame);
});

function activate(idx) {
  if (idx === activeIdx) return;
  const tool = TOOLS[idx];
  if (tool.admin) {
    const auth = getAuth();
    if (!auth || auth.id !== ADMIN_ID) {
      alert('🔒 이 메뉴는 관리자(김환기)만 이용할 수 있습니다.');
      return;
    }
  }
  doActivate(idx);
}

window.addEventListener('message', e => {
  if (!e.data) return;
  if (e.data.type === 'cams_goto') doActivate(e.data.idx + 1);
  if (e.data.type === 'cams_torque_stat') {
    const frames = content.querySelectorAll('iframe');
    frames[0].contentWindow && frames[0].contentWindow.postMessage(e.data, '*');
  }
  if (e.data.type === 'cams_request_stat') {
    const torqueFrame = content.querySelectorAll('iframe')[1];
    if (torqueFrame && torqueFrame.src) {
      torqueFrame.contentWindow && torqueFrame.contentWindow.postMessage({ type: 'cams_request_stat' }, '*');
    }
  }
});

function doActivate(idx) {
  const tabs = tabBar.querySelectorAll('.tab');
  const frames = content.querySelectorAll('iframe');
  tabs[activeIdx].classList.remove('active');
  frames[activeIdx].classList.remove('active');
  activeIdx = idx;
  tabs[idx].classList.add('active');
  frames[idx].classList.add('active');
  if (!frames[idx].src || frames[idx].src === location.href) {
    frames[idx].src = frames[idx].dataset.src;
  }
  tabs[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}
</script>
</body>
</html>
