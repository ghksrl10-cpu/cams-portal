/* 항목 수: [설비8, 금형4, 대차4, 선입선출4, 부품1, 정리4, 안전6, 표준1, 시종1, 품질4] */
const CNT = [8,4,4,4,1,4,6,1,1,4];

function makeChecklist(scoresByGroup, issues) {
  const cl = {};
  CNT.forEach((cnt, ci) => {
    for (let ii = 0; ii < cnt; ii++) {
      const key = ci + '_' + ii;
      const iss = (issues && issues[key]) || {};
      cl[key] = {
        score: (scoresByGroup[ci] && scoresByGroup[ci][ii]) || 5,
        issue: iss.issue || '',
        action: iss.action || ''
      };
    }
  });
  return cl;
}

function initZP() {
  return {A:{before:[],after:[]},B:{before:[],after:[]},C:{before:[],after:[]},D:{before:[],after:[]},E:{before:[],after:[]}};
}

  대차(ci=2) ii: 0=식별관리, 1=훼손변형, 2=청결상태, 3=정위치
  정리(ci=5) ii: 0=불필요품방치, 1=작업대정리, 2=청소상태, 3=구획선
  안전(ci=6) ii: 0=보호구착용, 1=안전표지, 2=비상구확보, 3=소화기, 4=전기안전, 5=화학물질관리

*/

const SCORES = [176,174,170,169,178,171,175,173,168,170,169,172];

function log(msg, cls='') {
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

async function upload() {
  document.getElementById('btn').disabled = true;
  document.getElementById('log').innerHTML = '';

  let db;
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    log('Firebase 연결 완료', 'info');
  } catch(e) {
    log('Firebase 오류: ' + e.message, 'err');
    document.getElementById('btn').disabled = false;
    return;
  }

  let ok = 0;
  for (const r of RECORDS) {
    try {
      const checklist = makeChecklist(r.s, r.issues);
      let total = 0;
      for (const k in checklist) total += checklist[k].score || 0;

      await db.collection('fivees').doc('rec__' + r.ym).set({
        ym: r.ym,
        date: r.date,
        checker: r.checker,
        checklist,
        zonePhotos: initZP(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      log(`✅ ${r.ym}  ${r.date.m}/${r.date.d}  총점 ${total}/185점  (100점 환산 ${Math.round(total/185*100)}점)`, 'ok');
      ok++;
    } catch(e) {
      log(`❌ ${r.ym} 실패: ${e.message}`, 'err');
    }
  }

  const avg = Math.round(SCORES.reduce((a,b)=>a+b,0)/SCORES.length*10)/10;
  log('', '');
  log(`완료! ${ok}/${RECORDS.length}개 업로드됨  ·  평균 ${avg}/185점  (100점 환산 ${Math.round(avg/185*100)}점)`, 'done');
  if (ok === RECORDS.length) {
    log('이제 3정5S 관리 앱을 열고 🔄 새로고침 버튼을 누르세요.', 'info');
  }
  document.getElementById('btn').disabled = false;
}
