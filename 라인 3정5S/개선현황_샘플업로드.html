function log(msg, cls='') {
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

async function upload() {
  document.getElementById('btn').disabled = true;
  document.getElementById('log').innerHTML = '';

  const db = firebase.firestore();
  log('Firebase 연결 완료', 'info');

  let ok = 0;
  for (const r of RECORDS) {
    try {
      const data = {
        no: r.no, process: r.process, worker: r.worker,
        date: r.date, schedule: r.schedule, note: r.note,
        problem: r.problem,
        before_photos: r.before_photos, before_desc: r.before_desc,
        temp_photos: r.temp_photos, temp_desc: r.temp_desc,
        root_photos: r.root_photos, root_desc: r.root_desc,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      };
      await db.collection('improvements').add(data);
      log(`<span class="q">[${r.quarter}]</span> ${r.no} — ${r.process}`, 'ok');
      ok++;
    } catch(e) {
      log(`❌ ${r.no} 실패: ${e.message}`, 'err');
    }
  }

  log('', '');
  log(`완료! ${ok}/${RECORDS.length}개 업로드됨`, 'done');
  log('앱 → 개선현황 탭 → 각 기록 클릭 → 사진 추가하세요.', 'info');
  document.getElementById('btn').disabled = false;
}
