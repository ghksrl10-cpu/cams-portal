<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무일지 자동화 | 캠스</title>
<style>
:root{
  --bd:#dde1e7;--line:#e8ebf0;--hd:#eef0f3;--hd2:#e4e7ec;
  --blue:#3b82f6;--blue2:#2563eb;
  --ok:#16a34a;--okbg:#dcfce7;--ng:#dc2626;--ngbg:#fee2e2;
  --warn:#d97706;--warnbg:#fef3c7;
  --mut:#6b7280;--ink:#111827;
  --side:#1e3a5f;--bg:#f8fafc;--card:#ffffff;
}
body.dark{
  --bd:#2a2d35;--line:#23262f;--hd:#1a1d24;--hd2:#20232b;
  --ok:#22c55e;--okbg:#052e16;--ng:#ef4444;--ngbg:#2d0a0a;
  --warn:#f59e0b;--warnbg:#1c1a05;
  --mut:#9ca3af;--ink:#f1f5f9;--side:#13151c;--bg:#0f1117;--card:#1a1d24;
}
*{box-sizing:border-box}
body{margin:0;font-family:"맑은 고딕","Malgun Gothic",system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:15px}

/* ── 레이아웃 ── */
.app{display:flex;min-height:100vh}
.side{width:230px;background:var(--side);border-right:1px solid var(--bd);position:fixed;top:0;bottom:0;left:0;display:flex;flex-direction:column;z-index:30}
.brand{display:flex;align-items:center;gap:10px;padding:18px 16px;border-bottom:1px solid var(--line)}
.brand .logo{width:44px;height:44px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px;background:#dbeafe;border-radius:10px}
.brand b{font-size:15px}.brand small{display:block;color:var(--mut);font-size:12px;margin-top:1px}
.nav{padding:10px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:12px 13px;border-radius:9px;cursor:pointer;color:#94a3b8;font-weight:600;font-size:15px;margin-bottom:3px;transition:background .15s}
.nav-item:hover{background:#20232b}
.nav-item.active{background:var(--blue);color:#fff}
.nav-item .ic{width:22px;text-align:center;font-size:17px}
.side-foot{padding:14px 16px;border-top:1px solid var(--line);font-size:12px;color:var(--mut);line-height:1.6}

.main{flex:1;margin-left:230px;padding:20px 24px 70px;max-width:1400px}
.page-h{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:4px 0 18px}
.page-h h1{font-size:22px;margin:0}
.grow{flex:1}

/* ── 버튼 ── */
.btn{padding:9px 14px;border:1px solid var(--bd);border-radius:9px;background:#20232b;cursor:pointer;font-size:14px;font-weight:600;color:#e2e8f0;transition:background .15s;font-family:inherit}
.btn:hover{background:#2a2d35}
.btn.pri{background:var(--blue);color:#fff;border-color:var(--blue)}.btn.pri:hover{background:var(--blue2)}
.btn.ok{background:var(--okbg);color:var(--ok);border-color:var(--ok)}
.btn.warn{background:var(--warnbg);color:var(--warn);border-color:var(--warn)}
.btn.danger{background:var(--ngbg);color:var(--ng);border-color:var(--ng)}
.btn.sm{padding:5px 10px;font-size:12px}
label.btn{cursor:pointer;display:inline-flex;align-items:center;gap:4px}

/* ── 카드 ── */
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.card{background:#1a1d24;border:1px solid var(--bd);border-radius:14px;padding:16px 18px}
.card .ic{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;margin-bottom:10px}
.card .num{font-size:30px;font-weight:800;line-height:1}.card .lab{color:var(--mut);font-size:13px;margin-top:6px}
.ic.b{background:#dbeafe;color:#2563eb}.ic.g{background:var(--okbg);color:var(--ok)}.ic.y{background:#fef3c7;color:#b45309}.ic.p{background:#f3e8ff;color:#7c3aed}

/* ── 폼 카드 ── */
.form-card{background:#1a1d24;border:1px solid var(--bd);border-radius:12px;padding:18px 20px;margin-bottom:14px}
.form-card h3{margin:0 0 12px;font-size:15px;font-weight:800}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:12px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.4px}
.fg textarea{padding:10px 11px;border:1px solid var(--bd);border-radius:8px;font-size:14px;background:#0f1117;color:#f1f5f9;font-family:'Consolas','D2Coding','맑은 고딕',monospace;resize:vertical;transition:border-color .15s;line-height:1.65}
.fg textarea:focus{outline:none;border-color:var(--blue)}

/* ── 테이블 ── */
.tbl-wrap{background:#1a1d24;border:1px solid var(--bd);border-radius:12px;overflow:hidden;overflow-x:auto}
.tbl-wrap table{border-collapse:collapse;width:100%;min-width:520px}
.tbl-wrap th{background:var(--hd);padding:11px 13px;text-align:left;font-weight:700;font-size:13px;border-bottom:1px solid var(--bd);white-space:nowrap}
.tbl-wrap td{padding:10px 13px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:top}
.tbl-wrap tr:last-child td{border-bottom:0}
.tbl-wrap tr:hover td{background:#1e2533}

/* ── 배지 ── */
.badge{font-size:12px;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-block;white-space:nowrap;margin:1px 1px}
.badge.bl{background:#dbeafe;color:#1d4ed8}
.badge.gr{background:var(--okbg);color:var(--ok)}
.badge.yw{background:var(--warnbg);color:var(--warn)}
.badge.pp{background:#f3e8ff;color:#7c3aed}
.badge.mt{background:#1e2533;color:var(--mut)}

/* ── 검색바 ── */
.search-bar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.search-bar input{flex:1;min-width:180px;padding:9px 12px;border:1px solid var(--bd);border-radius:9px;font-size:14px;background:#1a1d24;color:#f1f5f9;font-family:inherit}
.search-bar input:focus{outline:none;border-color:var(--blue)}

/* ── 2열 ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* ── 출력 (모노스페이스) ── */
pre.out-pre{
  background:#0f1117;border:1px solid var(--bd);border-radius:8px;
  padding:13px;font-family:'Consolas','D2Coding','맑은 고딕',monospace;
  font-size:13.5px;line-height:1.75;white-space:pre-wrap;
  overflow-y:auto;color:#c9d1d9;min-height:200px;margin:0;word-break:break-all;
}
.c-hd{color:#79c0ff;font-weight:700}
.c-sep{color:#2a2d35}
.c-num{color:#e6edf3;font-weight:700}
.c-cat{background:#1c2d40;color:#79c0ff;font-size:.72rem;padding:1px 6px;border-radius:4px;margin-left:4px}
.c-mdl{background:#2a1a5a;color:#d2a8ff;font-size:.72rem;padding:1px 6px;border-radius:4px;margin-left:2px}
.c-det{color:#8b949e}
.c-sub{color:#7aafcc}
.c-con{color:#6e7681}
.c-rh{color:#e3b341}
.c-rel{color:#8b949e}
.c-emp{color:#484f58;font-size:14px}

/* ── 상태 ── */
#status{font-size:13px;min-height:1.1em;margin-top:6px}
.empty{text-align:center;padding:40px 20px;color:var(--mut);font-size:14px}

/* ── 사진 ── */
.photo-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.ph{position:relative;width:80px;height:60px;flex-shrink:0}
.ph img{width:100%;height:100%;object-fit:cover;border-radius:6px;border:1px solid var(--bd);cursor:pointer;display:block}
.ph .del{position:absolute;top:-7px;right:-7px;width:20px;height:20px;border-radius:50%;background:var(--ng);color:#fff;border:none;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;font-weight:700}
.ph .ph-save{position:absolute;bottom:-7px;right:-7px;width:20px;height:20px;border-radius:50%;background:var(--blue);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;text-decoration:none}
.paste-zone{min-height:46px;border:2px dashed var(--bd);border-radius:8px;padding:10px 14px;cursor:pointer;transition:border-color .15s,background .15s;display:flex;align-items:center;gap:8px;color:var(--mut);font-size:13px;user-select:none}
.paste-zone:hover,.paste-zone.drag{border-color:var(--blue);background:#0d1f3c;color:var(--ink)}
#imgModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;align-items:center;justify-content:center;cursor:zoom-out}
#imgModal.show{display:flex}
#imgModal img{max-width:92vw;max-height:88vh;border-radius:10px;box-shadow:0 12px 60px rgba(0,0,0,.7)}

/* ── 사용법 ── */
.help-card{background:#1a1d24;border:1px solid var(--bd);border-radius:12px;padding:18px 20px;margin-bottom:12px}
.help-card h3{font-size:15px;font-weight:800;margin:0 0 12px;color:var(--ok)}
.help-code{background:#0f1117;border:1px solid var(--bd);border-radius:8px;padding:12px 14px;font-family:'Consolas','D2Coding',monospace;font-size:13px;line-height:1.75;white-space:pre;overflow-x:auto;color:#c9d1d9;margin-top:8px}

/* ── 모바일 ── */
.hamb{display:none}
.scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:25}
.scrim.show{display:block}
@media(max-width:820px){
  .side{transform:translateX(-100%);transition:.25s;box-shadow:0 0 30px rgba(0,0,0,.3)}
  .side.open{transform:translateX(0)}
  .main{margin-left:0;padding:14px 14px 70px}
  .hamb{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border:1px solid var(--bd);border-radius:9px;background:#1a1d24;font-size:18px;cursor:pointer}
  .cards{grid-template-columns:repeat(2,1fr)}
  .two-col{grid-template-columns:1fr}
}
@media(max-width:440px){.cards{grid-template-columns:1fr}}
body:not(.dark) .btn{background:#fff;color:#374151;border-color:#d1d5db}
body:not(.dark) .btn:hover{background:#f3f4f6}
body:not(.dark) .btn.pri{background:var(--blue);color:#fff;border-color:var(--blue)}
body:not(.dark) .btn.ok{background:var(--okbg);color:var(--ok);border-color:var(--ok)}
body:not(.dark) .btn.warn{background:var(--warnbg);color:var(--warn);border-color:var(--warn)}
body:not(.dark) .btn.danger{background:var(--ngbg);color:var(--ng);border-color:var(--ng)}
body:not(.dark) .card,body:not(.dark) .form-card,body:not(.dark) .tbl-wrap,body:not(.dark) .help-card{background:#fff;border-color:var(--bd)}
body:not(.dark) .tbl-wrap th{background:var(--hd)}
body:not(.dark) input,body:not(.dark) select,body:not(.dark) textarea{background:#fff;color:#111827;border-color:var(--bd)}
body:not(.dark) .search-bar input{background:#fff;color:#111827;border-color:var(--bd)}
body:not(.dark) tr:hover td{background:#eef2ff}
body:not(.dark) .paste-zone{border-color:var(--bd);color:#6b7280}
body:not(.dark) .paste-zone:hover{border-color:var(--blue);background:#eff6ff}
body:not(.dark) .help-code{background:#f8fafc;color:#374151;border-color:var(--bd)}
body:not(.dark) .nav-item{color:#4b5563}
body:not(.dark) .hamb{background:#fff;border-color:var(--bd)}
body:not(.dark) .sec-h{background:var(--hd);color:var(--ink)}
body:not(.dark) #overlay{background:rgba(245,246,248,.97);color:#111827}
</style>
</head>

<!-- 이미지 확대 모달 -->
<div id="imgModal" onclick="this.classList.remove('show')">
  <img id="imgModalImg" src="" alt="사진">
</div>

<div class="scrim" id="scrim" onclick="closeNav()"></div>
<div class="app">

<!-- ══ 사이드바 ══ -->
<aside class="side" id="side">
  <div class="brand">
    <div class="logo">📋</div>
    <div>
      <b>업무일지 자동화</b>
      <small>주식회사 캠스</small>
      <small id="headerUser">생산팀 조립 · 김환기</small>
    </div>
  </div>
  <nav class="nav">
    <div class="nav-item active" id="nav-today" onclick="go('today')"><span class="ic">📝</span>오늘 일지</div>
    <div class="nav-item" id="nav-history" onclick="go('history')"><span class="ic">📋</span>이력 조회</div>
    <div class="nav-item" id="nav-help" onclick="go('help')"><span class="ic">❓</span>사용법</div>
    <div class="nav-item" id="nav-auto" onclick="go('auto')"><span class="ic">🤖</span>자동완성</div>
  </nav>
  <div class="side-foot" id="sideInfo">이력 로딩 중…</div>
</aside>

<!-- ══ 메인 ══ -->
<main class="main">
  <div id="pg-today"></div>
  <div id="pg-history" style="display:none"></div>
  <div id="pg-help"    style="display:none"></div>
  <div id="pg-auto"    style="display:none"></div>
</main>
</div>

<script>
/* ════════════════════════════════════════════════════

const TAG_TB={
  "차종":{"PU":["PU"],"NQ5":["NQ5"],"SP2":["SP2"],"SP3":["SP3"],"SK3":["SK3"],"PE":["PE"],"LDT":["LDT"],"LPI":["LPI"],"QV":["QV"],"NQ6":["NQ6"],"RHD":["RHD"]},

  "이슈":{"불량":["불량"],"버":["버 "," 버","버제거","버 제거"],"찍힘":["찍힘"],"긁힘":["긁힘"],"스크래치":["스크레치","스크래치"],"기스":["기스"],"누락":["누락"],"파손":["파손"],"단차":["단차"],"이물":["이물","티먼지","티/먼지"]},
  "업무유형":{"조립":["조립"],"점검/검사":["점검","검사","전수"],"ERP입력":["ERP","POP","전표","알카","ALC"],"회의":["회의","간담회"],"패드작업":["패드"],"교육":["교육"],"식별표":["식별표"],"안전/환경":["소방","안전점검","위험물","5S","3정"],"실적/KPI":["실적","KPI","사업계획","마감"]}

const WT={"차종":3,"부위":3,"이슈":2,"업무유형":1};
const CORE=new Set(["차종","부위","이슈"]);
const MINSCORE=3,TOPN=3;
const RWDS=["완료","해결","없음","조치","확인","재발","대응"];

/* ════════ 분류 함수 ════════ */
function classify(t){
  for(const[n,ks]of CATS) for(const k of ks) if(t.includes(k)) return n;
  return"기타";
}
function detectModel(t){
  const u=t.toUpperCase();
  if(u.includes("NQ5")&&u.includes("PE")) return (u.includes("X-LINE")||u.includes("X LINE"))?"NQ5 PE(X-LINE)":"NQ5 PE(STD)";
  if(u.includes("SP2")) return u.includes("LDT")?"SP2 PE(LDT)":"SP2 PE(STD)";
  for(const m of["NQ5","SP3","OV1","SK3","AX1","PU","NQ6","LT2"]) if(u.includes(m)) return m;
  return"";
}
function tagText(t){
  const up=t.toUpperCase(),res={};
  for(const[cat,tbl]of Object.entries(TAG_TB)){
    const found=[];
    for(const[std,vs]of Object.entries(tbl)) for(const v of vs) if(up.includes(v.toUpperCase())){found.push(std);break;}
    if(found.length) res[cat]=found;
  }
  return res;
}
function scoreItems(a,b){
  let tot=0,core=false;
  for(const[cat,w]of Object.entries(WT)){
    const s=new Set(a[cat]||[]);
    const c=(b[cat]||[]).filter(x=>s.has(x));
    tot+=w*c.length; if(c.length&&CORE.has(cat)) core=true;
  }
  return{tot,core};
}
function sumLine(ds){
  for(let i=ds.length-1;i>=0;i--) if(RWDS.some(w=>ds[i].includes(w))) return ds[i];
  return ds[0]||"";
}
function findRel(item,hist){
  const cand=[];
  for(const h of hist){if(!h.title)continue; const{tot,core}=scoreItems(item.tags,h.tags); if(core&&tot>=MINSCORE) cand.push({tot,h});}
  cand.sort((a,b)=>b.tot-a.tot);
  const seen=new Set(),out=[];
  for(const{h}of cand){const k=h.date+"|"+h.title; if(seen.has(k)||h.title===item.title)continue; seen.add(k);out.push(h); if(out.length>=TOPN)break;}
  return out;
}

/* ════════ 파싱 ════════ */
function parseToday(text){
  const RE=/^\s*\d{1,2}\s*[.)]\s*(.*)$/,MK=['-','·','∙','ㄴ'];
  const items=[];let cur=null;
  for(const ln of text.split('\n')){
    const s=ln.trim(); if(!s||s.startsWith('#')) continue;
    const m=ln.match(RE),hasMK=s.length>0&&MK.includes(s[0]),inden=ln.length>0&&(ln[0]===' '||ln[0]==='\t');
    if(hasMK&&cur){const isSub=s[0]==='ㄴ',txt=s.replace(/^[-·∙ㄴ ]+/,'').trim(); cur.details.push(isSub?'ㄴ '+txt:txt);}
    else if(inden&&cur&&cur.details.length) cur.details.push('↳ '+s);
    else if(inden&&cur) cur.details.push(s);
    else{if(cur)items.push(cur); const title=(m&&!hasMK)?m[1].trim():s; cur={title,details:[]};}
  }
  if(cur)items.push(cur);
  for(const it of items) it.tags=tagText(it.title+' '+it.details.join(' '));
  return items;
}

/* ════════ 이력 (localStorage) ════════ */
const LSKEY='jisa_history_v1';
function loadHist(){
  try{
    const rows=[];
    for(const rec of JSON.parse(localStorage.getItem(LSKEY)||'[]'))
      for(const it of(rec.items||[]))
        rows.push({date:rec.date||'날짜미상',title:(it.title||'').trim(),details:it.details||[],
                   tags:it.tags||tagText((it.title||'')+' '+(it.details||[]).join(' '))});
    return rows;
  }catch(e){return[];}
}
function getRecs(){try{return JSON.parse(localStorage.getItem(LSKEY)||'[]');}catch(e){return[];}}
function saveHist(today,items,photos){
  let recs=getRecs().filter(r=>!(r.date===today&&r.src==='daily'));
  const plain=ds=>ds.map(d=>(d.startsWith('ㄴ ')||d.startsWith('↳ '))?d.slice(2).trim():d);
  recs.push({date:today,src:'daily',items:items.map(it=>({title:it.title,details:plain(it.details),tags:it.tags})),photos:photos||[]});
  recs.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  localStorage.setItem(LSKEY,JSON.stringify(recs)); updSideInfo();
}
function importJSON(arr){
  let recs=getRecs(),added=0;
  for(const rec of arr){
    if(!rec.items) continue;
    for(const it of rec.items) if(!it.tags) it.tags=tagText((it.title||'')+' '+(it.details||[]).join(' '));
    const k=(rec.date||'')+'|'+(rec.items[0]?.title||'')+'|'+(rec.src||'idx');
    if(!recs.some(r=>(r.date||'')+'|'+(r.items?.[0]?.title||'')+'|'+(r.src||'idx')===k)){recs.push(rec);added++;}
  }
  recs.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  localStorage.setItem(LSKEY,JSON.stringify(recs)); updSideInfo(); return added;
}
function updSideInfo(){
  const recs=getRecs();
  const tot=recs.reduce((s,r)=>s+(r.items?.length||0),0);
  const daily=recs.filter(r=>r.src==='daily').length;
  document.getElementById('sideInfo').innerHTML=
    `저장 이력: <b style="color:var(--ink)">${tot}건</b><br>일지 ${daily}일 누적`;
}

/* ════════ 유틸 ════════ */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function getToday(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function getTodayFull(){const d=new Date();const days=['일','월','화','수','목','금','토'];return`${getToday()} (${days[d.getDay()]})`;}
function setStatus(msg,type){
  const el=document.getElementById('status');if(!el)return;
  el.textContent=msg;el.style.color=type==='ok'?'var(--ok)':type==='warn'?'var(--warn)':'var(--ng)';
}

/* ════════ 출력 생성 ════════ */
let lastTxt='', lastItems=[], lastRelCount=0;
function run(){
  const raw=document.getElementById('inp')?.value||'';
  const items=parseToday(raw);
  if(!items||!items.length){setStatus('입력 내용이 없습니다','warn');return;}
  const hist=loadHist(), today=getToday();
  const tl=[],hl=[];
  function L(tv,hv){tl.push(tv);hl.push(hv!==undefined?hv:esc(tv));}
  const _uname = window._authName || '김환기';
  L(`${today}  업무일지   (생산팀 ${_uname})`,`<span class="c-hd">${today}  업무일지   (생산팀 ${_uname})</span>`);
  L('='.repeat(46),`<span class="c-sep">${'='.repeat(46)}</span>`);
  L('','');
  let totalRel=0;
  for(let n=0;n<items.length;n++){
    const it=items[n],full=it.title+' '+it.details.join(' ');
    const cat=classify(full),mdl=detectModel(full),tag=mdl?`[${cat} · ${mdl}]`:`[${cat}]`;
    tl.push(`${n+1}. ${it.title}   ${tag}`);
    let tgH=`<span class="c-cat">${esc(cat)}</span>`;
    if(mdl) tgH+=` <span class="c-mdl">${esc(mdl)}</span>`;
    hl.push(`<span class="c-num">${n+1}. ${esc(it.title)}</span>   ${tgH}`);
    for(const d of it.details){
      if(d.startsWith('ㄴ ')){const t=d.slice(2).trim();L(`        ㄴ ${t}`,`<span class="c-sub">        ㄴ ${esc(t)}</span>`);}
      else if(d.startsWith('↳ ')){const t=d.slice(2).trim();L(`           ${t}`,`<span class="c-con">           ${esc(t)}</span>`);}
      else{L(`   - ${d}`,`<span class="c-det">   - ${esc(d)}</span>`);}
    }
    const rel=findRel(it,hist); totalRel+=rel.length;
    if(rel.length){
      L('   📌 과거 유사 대응:',`<span class="c-rh">   📌 과거 유사 대응:</span>`);
      for(const h of rel){const s=sumLine(h.details),tail=s?` → ${s}`:'';L(`      · [${h.date}] ${h.title}${tail}`,`<span class="c-rel">      · [${esc(h.date)}] ${esc(h.title)}${esc(tail)}</span>`);}
    }
    L('','');
  }
  lastTxt=tl.join('\n').trimEnd()+'\n'; lastItems=items; lastRelCount=totalRel;
  document.getElementById('out-pre').innerHTML=hl.join('\n');
  saveHist(today,items,todayPhotos);
  setStatus(`✅ ${items.length}건 처리 완료${totalRel?` (관련 사례 ${totalRel}건 첨부)`:''} ${todayPhotos.length?`📷 사진 ${todayPhotos.length}장`:''}`, 'ok');
  // 카드 갱신
  document.getElementById('c-count').textContent=items.length;
  document.getElementById('c-rel').textContent=totalRel;
}

let todayPhotos=[];

function compressImage(file,maxDim,q){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>=h&&w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}
        else if(h>w&&h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}
        const cv=document.createElement('canvas');cv.width=w;cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        res(cv.toDataURL('image/jpeg',q));
      };
      img.onerror=rej; img.src=r.result;
    };
    r.onerror=rej; r.readAsDataURL(file);
  });
}

function addPhotos(input){
  Array.from(input.files).forEach(async f=>{
    if(todayPhotos.length>=5){alert('사진은 최대 5장까지 첨부 가능합니다');return;}
    const url=await compressImage(f,1024,0.55);
    todayPhotos.push({url,name:f.name});
    refreshPhotoList();
  });
  input.value='';
}

function refreshPhotoList(){
  const el=document.getElementById('photoList'); if(!el) return;
  el.innerHTML=todayPhotos.map((p,i)=>`<div class="ph">
    <img src="${p.url}" onclick="viewImg('${p.url}')">
    <button class="del" onclick="todayPhotos.splice(${i},1);refreshPhotoList()">✕</button>
    <a class="ph-save" href="${p.url}" download="${p.name||'photo.jpg'}" title="기기에 저장">💾</a>
  </div>`).join('');
  const hint=document.getElementById('pasteHint');
  if(hint) hint.style.display=todayPhotos.length?'none':'flex';
}

function viewImg(url){
  const m=document.getElementById('imgModal');
  document.getElementById('imgModalImg').src=url;
  m.classList.add('show');
}

/* Ctrl+V 붙여넣기 */
document.addEventListener('paste',async e=>{
  if(curPage!=='today') return;
  const files=[...e.clipboardData.items]
    .filter(i=>i.type.startsWith('image/'))
    .map(i=>i.getAsFile()).filter(Boolean);
  if(!files.length) return;
  e.preventDefault();
  for(const file of files){
    if(todayPhotos.length>=5){alert('사진은 최대 5장까지 첨부 가능합니다');break;}
    const url=await compressImage(file,1024,0.55);
    todayPhotos.push({url,name:'붙여넣기_'+(todayPhotos.length+1)+'.jpg'});
    refreshPhotoList();
  }
});

/* 드래그&드롭 */
function onPhotoDragOver(e){e.preventDefault();e.currentTarget.classList.add('drag');}
function onPhotoDragLeave(e){e.currentTarget.classList.remove('drag');}
async function onPhotoDrop(e){
  e.preventDefault(); e.currentTarget.classList.remove('drag');
  const files=[...e.dataTransfer.files].filter(f=>f.type.startsWith('image/'));
  for(const file of files){
    if(todayPhotos.length>=5){alert('사진은 최대 5장까지 첨부 가능합니다');break;}
    const url=await compressImage(file,1024,0.55);
    todayPhotos.push({url,name:file.name});
    refreshPhotoList();
  }
}

let curPage='today';
function go(page){
  document.getElementById('nav-'+curPage)?.classList.remove('active');
  document.getElementById('pg-'+curPage).style.display='none';
  curPage=page;
  document.getElementById('nav-'+page)?.classList.add('active');
  document.getElementById('pg-'+page).style.display='';
  closeNav();
  ({today:renderToday,history:renderHistory,help:renderHelp,auto:renderAuto}[page]||renderToday)();
}
function toggleNav(){document.getElementById('side').classList.toggle('open');document.getElementById('scrim').classList.toggle('show');}
function closeNav(){document.getElementById('side').classList.remove('open');document.getElementById('scrim').classList.remove('show');}

function getAllHist(){
  // localStorage(최신 오늘 일지) + 임베드 데이터 병합
  const localRecs = getRecs();
  const rows = [];
  // localStorage 우선 (src=daily)
  for(const rec of localRecs){
    const recPhotos=rec.photos||[];
    for(const it of(rec.items||[])){
      rows.push({
        date: rec.date||'날짜미상',
        src: rec.src||'',
        approx: false,
        title: (it.title||'').trim(),
        dets: it.details||[],
        tags: it.tags||tagText((it.title||'')+' '+(it.details||[]).join(' ')),
        photos: recPhotos
      });
    }
  }
  // 임베드 데이터 (localStorage와 중복 제외)
  const localKeys = new Set(rows.map(r=>r.date+'|'+r.title));
  for(const it of HIST_EMBEDDED){
    const key = (it.date||'')+'|'+(it.title||'');
    if(localKeys.has(key)) continue;
    rows.push({
      date: it.date||'날짜미상',
      src: it.src||'',
      approx: it.approx||false,
      title: (it.title||'').trim(),
      dets: it.dets||[],
      tags: tagText((it.title||'')+' '+(it.dets||[]).join(' '))
    });
  }
  return rows;
}

/* ════════ 자동완성 ════════ */
function searchByKeyword(kw){
  const words=kw.trim().toLowerCase().split(/\s+/).filter(w=>w.length>=2);
  if(!words.length) return [];
  const all=getAllHist();
  const scored=all.map(item=>{
    const title=item.title.toLowerCase();
    const detsText=(item.dets||[]).join(' ').toLowerCase();
    let score=0;
    let titleHits=0;
    for(const w of words){
      if(title.includes(w)){score+=10;titleHits++;}
      else if(detsText.includes(w)){score+=1;}
    }
    // 타이틀에 검색어 단어가 많이 포함될수록 보너스
    if(titleHits>=2) score+=15;
    if(titleHits===words.length) score+=20;
    return {item,score};
  }).filter(x=>x.score>0);
  scored.sort((a,b)=>b.score-a.score);
  return scored.slice(0,5).map(x=>x.item);
}

function getApiKey(){return localStorage.getItem('cams_claude_key')||'';}

function autoGenSimple(raw){
  const lines=raw.split(/[,\n]/).map(s=>s.trim()).filter(Boolean);
  return lines.map((l,i)=>(i+1)+'. '+l).join('\n');
}

function buildHistContext(raw){
  const lines=raw.split(/[,\n]/).map(s=>s.trim()).filter(Boolean);
  const seenKeys=new Set();
  const items=[];
  for(const line of lines){
    const subKws=line.includes('/')?line.split('/').map(s=>s.trim()).filter(Boolean):[line];
    for(const sk of subKws){
      for(const item of searchByKeyword(sk).slice(0,2)){
        const key=item.date+'|'+item.title;
        if(!seenKeys.has(key)){seenKeys.add(key);items.push(item);}
      }
    }
  }
  return items.slice(0,6).map(item=>
    item.title+'\n'+
    (item.dets||[]).slice(0,8).map(d=>'  '+d).join('\n')
  ).join('\n\n');
}

<script>
/* ===== OneDrive 자동 백업 ===== */
(async()=>{
  const FILE='jisa_backup.json';
  const IDB='cams_od_v1';
  async function _db(){return new Promise(r=>{const q=indexedDB.open(IDB,1);q.onupgradeneeded=e=>e.target.result.createObjectStore('h');q.onsuccess=e=>r(e.target.result);});}
  async function _get(){const db=await _db();return new Promise(r=>{const t=db.transaction('h','readonly');const q=t.objectStore('h').get('dir');q.onsuccess=()=>r(q.result||null);});}
  async function _put(h){const db=await _db();return new Promise(r=>{const t=db.transaction('h','readwrite');t.objectStore('h').put(h,'dir');t.oncomplete=r;});}
  let dir=null;
  async function checkPerm(){
    dir=await _get();if(!dir)return false;
    try{const p=await dir.queryPermission({mode:'readwrite'});if(p==='granted')return true;const r=await dir.requestPermission({mode:'readwrite'});return r==='granted';}
    catch(e){dir=null;return false;}
  }
  async function odSave(){
    if(!dir)return;
    try{
      const data={jisa:localStorage.getItem(LSKEY),apiKey:localStorage.getItem('cams_claude_key')};
      const fh=await dir.getFileHandle(FILE,{create:true});const w=await fh.createWritable();await w.write(JSON.stringify(data));await w.close();
    }catch(e){}
  }
  async function odLoad(){if(!dir)return null;try{const fh=await dir.getFileHandle(FILE);return JSON.parse(await(await fh.getFile()).text());}catch(e){return null;}}
  const btn=document.createElement('button');
  btn.style.cssText='position:fixed;bottom:12px;right:12px;z-index:9999;padding:6px 14px;border:none;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;color:#fff;';
  document.body.appendChild(btn);
  const ok=await checkPerm();
  btn.textContent=ok?'☁️ OneDrive 연결됨':'☁️ OneDrive 연결';
  btn.style.background=ok?'#1a7f37':'#555';
  btn.onclick=async()=>{
    try{dir=await showDirectoryPicker({mode:'readwrite'});await _put(dir);btn.textContent='☁️ OneDrive 연결됨';btn.style.background='#1a7f37';await odSave();}
    catch(e){}
  };
  if(ok){
    const saved=await odLoad();
    if(saved){
      if(saved.jisa)localStorage.setItem(LSKEY,saved.jisa);
      if(saved.apiKey)localStorage.setItem('cams_claude_key',saved.apiKey);
      updSideInfo();renderToday();
    }
  }
  const _origSet=localStorage.setItem.bind(localStorage);
  localStorage.setItem=function(k,v){_origSet(k,v);if(k===LSKEY||k==='cams_claude_key')odSave();};
})();

  if (!e.data) return;
  if (e.data.type === 'cams_theme') { document.body.classList.toggle('dark', !!e.data.dark); return; }
  if (e.data.type !== 'cams_auth') return;
  const { name, dept } = e.data;
  window._authName = name || '';
  const hu = document.getElementById('headerUser');
  if (hu) hu.textContent = '생산팀 조립 · ' + (name || '김환기');
});
window.parent.postMessage({ type: 'cams_request_theme' }, '*');
</script>
