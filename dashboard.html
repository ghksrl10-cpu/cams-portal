<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAMS 대시보드</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #0d0d0d; font-family: 'Apple SD Gothic Neo','Noto Sans KR',-apple-system,sans-serif; color: #fff; }
body { overflow-y: auto; }

.page { max-width: 960px; margin: 0 auto; padding: 40px 32px 60px; }
@media(max-width:600px){ .page{ padding:28px 18px 48px; } }

.top { margin-bottom: 36px; }
.eyebrow { font-size:11px; color:#666; letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; }
.title { font-size:36px; font-weight:300; letter-spacing:-1.5px; line-height:1.1; }
.date { font-size:13px; color:#555; margin-top:8px; }
@media(max-width:600px){ .title{ font-size:28px; } }

.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:2px; background:#1c1c1c; border-radius:20px; overflow:hidden; margin-bottom:14px; }
@media(max-width:700px){ .grid{ grid-template-columns:repeat(2,1fr); } }

.card { background:#0d0d0d; padding:26px 22px; }
.clabel { font-size:11px; color:#666; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:16px; }
.cnum { font-size:52px; font-weight:200; letter-spacing:-3px; line-height:1; color:#fff; }
.cunit { font-size:18px; color:#444; }
.csub { font-size:12px; margin-top:12px; display:flex; align-items:center; gap:6px; }
.dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }

.green { color:#32d74b; } .dg { background:#32d74b; }
.red   { color:#ff453a; } .dr { background:#ff453a; }
.yellow{ color:#ffd60a; } .dy { background:#ffd60a; }
.blue  { color:#0a84ff; } .db { background:#0a84ff; }
.muted { color:#555; }    .dm { background:#333; }

.bar { background:#0d0d0d; border-radius:20px; padding:26px 26px; margin-bottom:14px; }
.bar-top { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:20px; }
.blabel { font-size:11px; color:#666; letter-spacing:1.5px; text-transform:uppercase; }
.bnum { font-size:40px; font-weight:200; letter-spacing:-2px; line-height:1; }
.bnum span { font-size:14px; color:#555; margin-left:3px; }
.track { height:2px; background:#1c1c1c; border-radius:2px; overflow:hidden; }
.fill { height:100%; border-radius:2px; transition:width 1s cubic-bezier(.4,0,.2,1); }
.bar-foot { display:flex; justify-content:space-between; margin-top:12px; }
.bar-foot span { font-size:12px; color:#555; }
.bar-foot em { font-style:normal; color:#aaa; }

.list { background:#0d0d0d; border-radius:20px; overflow:hidden; }
.lhead { padding:22px 26px 12px; font-size:11px; color:#555; letter-spacing:2px; text-transform:uppercase; }
.lgrid { display:grid; grid-template-columns:1fr 1fr; border-top:1px solid #1a1a1a; }
@media(max-width:500px){ .lgrid{ grid-template-columns:1fr; } }
.litem { display:flex; align-items:center; justify-content:space-between; padding:17px 26px; border-bottom:1px solid #141414; cursor:pointer; transition:background .1s; -webkit-tap-highlight-color:transparent; }
.litem:nth-child(odd){ border-right:1px solid #141414; }
@media(max-width:500px){ .litem:nth-child(odd){ border-right:none; } }
.litem:hover { background:#131313; }
.litem:active { background:#171717; }
.lname { font-size:14px; color:#bbb; font-weight:300; }
.litem.locked .lname { color:#0a84ff60; }
.larrow { font-size:20px; color:#333; }
</style>
</head>
<body>
<div class="page">

  <div class="top">
    <div class="eyebrow">CAMS · Dashboard</div>
    <div class="title">오늘 현황</div>
    <div class="date" id="dateStr"></div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="clabel">토크 측정</div>
      <div class="cnum" id="torqueNum">—</div>
      <div class="csub muted" id="torqueSub"><span class="dot dm"></span>탭 방문 후 표시</div>
    </div>
    <div class="card">
      <div class="clabel">알카 불량</div>
      <div class="cnum" id="alkaNum">—</div>
      <div class="csub muted" id="alkaSub"><span class="dot dm"></span>로딩 중</div>
    </div>
    <div class="card">
      <div class="clabel">업무일지</div>
      <div class="cnum" id="jisaNum">—</div>
      <div class="csub muted" id="jisaSub"><span class="dot dm"></span>로딩 중</div>
    </div>
    <div class="card">
      <div class="clabel">이번달 입력</div>
      <div class="cnum" id="monthNum">—</div>
      <div class="csub muted" id="monthSub"><span class="dot dm"></span>로딩 중</div>
    </div>
  </div>

  <div class="bar">
    <div class="bar-top">
      <div class="blabel">알카 월 목표 달성률</div>
      <div class="bnum"><span id="barPct">—</span><span>%</span></div>
    </div>
    <div class="track"><div class="fill" id="barFill" style="width:0%"></div></div>
    <div class="bar-foot">
      <span><em id="barDone">—</em>건 완료</span>
      <span>잔여 <em id="barLeft">—</em>건 · 목표 <em id="barTarget">155</em>건</span>
    </div>
  </div>

  <div class="list">
    <div class="lhead">도구 바로가기</div>
    <div class="lgrid">
      <div class="litem" onclick="goTool(0)"><span class="lname">토크 측정</span><span class="larrow">›</span></div>
      <div class="litem" onclick="goTool(1)"><span class="lname">토크 관리</span><span class="larrow">›</span></div>
      <div class="litem" onclick="goTool(2)"><span class="lname">대차 관리</span><span class="larrow">›</span></div>
      <div class="litem" onclick="goTool(3)"><span class="lname">3정5S</span><span class="larrow">›</span></div>
      <div class="litem" onclick="goTool(4)"><span class="lname">알카 KPI</span><span class="larrow">›</span></div>
      <div class="litem" onclick="goTool(5)"><span class="lname">ALC 정리</span><span class="larrow">›</span></div>
      <div class="litem" onclick="goTool(6)"><span class="lname">컨베어</span><span class="larrow">›</span></div>
      <div class="litem" onclick="goTool(7)"><span class="lname">컨베어</span><span class="larrow">›</span></div>
      <div class="litem locked" onclick="goTool(7)"><span class="lname">🔒 업무일지</span><span class="larrow">›</span></div>
      <div class="litem locked" onclick="goTool(8)"><span class="lname">🔒 PPTX 캡처</span><span class="larrow">›</span></div>
    </div>
  </div>

</div>
<script>
function goTool(idx){ window.parent.postMessage({type:'cams_goto',idx},'*'); }

window.addEventListener('message',e=>{
  if(e.data&&e.data.type==='cams_torque_stat'){
    document.getElementById('torqueNum').textContent=e.data.thisMonth;
    document.getElementById('torqueSub').innerHTML=`<span class="dot db"></span><span class="blue">누계 ${e.data.total}건</span>`;
  }
});

function pad(n){return String(n).padStart(2,'0');}

function init(){
  const now=new Date();
  const days=['일','월','화','수','목','금','토'];
  document.getElementById('dateStr').textContent=
    `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${days[now.getDay()]}요일`;
  const ym=`${now.getFullYear()}-${pad(now.getMonth()+1)}`;
  const today=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;

  try{
    const alka=JSON.parse(localStorage.getItem('alka_db_v1')||'null');
    if(alka&&alka.months){
      const mr=alka.months[ym]||[];
      const all=Object.values(alka.months).flat();
      const target=alka.targetCount||155;
      const done=mr.length;
      const pct=Math.round(done/target*100);
      document.getElementById('alkaNum').textContent=done;
      document.getElementById('alkaSub').innerHTML=done===0
        ?`<span class="dot dg"></span><span class="green">이번달 없음</span>`
        :done>=15?`<span class="dot dr"></span><span class="red">누계 ${all.length}건</span>`
        :`<span class="dot dy"></span><span class="yellow">누계 ${all.length}건</span>`;
      document.getElementById('monthNum').textContent=done;
      document.getElementById('monthSub').innerHTML=`<span class="dot dm"></span><span class="muted">목표 ${target}건 중</span>`;
      document.getElementById('barPct').textContent=pct;
      document.getElementById('barDone').textContent=done;
      document.getElementById('barLeft').textContent=Math.max(0,target-done);
      document.getElementById('barTarget').textContent=target;
      setTimeout(()=>{
        const f=document.getElementById('barFill');
        f.style.width=Math.min(pct,100)+'%';
        f.style.background=pct>=80?'#32d74b':pct>=50?'#0a84ff':'#ffd60a';
      },150);
    } else {
      ['alkaSub','monthSub'].forEach(id=>{
        document.getElementById(id).innerHTML=`<span class="dot dm"></span><span class="muted">알카탭 방문 후 표시</span>`;
      });
    }
  }catch(e){}

  try{
    const jisa=JSON.parse(localStorage.getItem('jisa_history_v1')||'[]');
    const ti=jisa.filter(r=>r.date===today).reduce((s,r)=>s+(r.items?r.items.length:0),0);
    const total=jisa.reduce((s,r)=>s+(r.items?r.items.length:0),0);
    document.getElementById('jisaNum').textContent=ti;
    document.getElementById('jisaSub').innerHTML=ti>0
      ?`<span class="dot db"></span><span class="blue">누계 ${total}건</span>`
      :`<span class="dot dm"></span><span class="muted">오늘 없음</span>`;
  }catch(e){}

  window.parent.postMessage({type:'cams_request_stat',tool:'torque'},'*');
}
init();
setInterval(init,60000);
</script>
</body>
</html>
