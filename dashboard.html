<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CAMS 대시보드</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #080808; font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', -apple-system, sans-serif; color: #fff; overflow-x: hidden; }

body { display: flex; flex-direction: column; }

.header {
  padding: 28px 22px 20px;
  flex-shrink: 0;
}
.header-sub { font-size: 10px; color: #ffffff20; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
.header-title { font-size: 26px; font-weight: 300; letter-spacing: -0.5px; }
.header-date { font-size: 12px; color: #ffffff30; margin-top: 4px; font-weight: 300; }

.scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 14px 32px; }

/* 4분할 카드 */
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #151515; border-radius: 20px; overflow: hidden; margin-bottom: 12px; }
.card { background: #0d0d0d; padding: 22px 18px; }
.card-label { font-size: 10px; color: #ffffff25; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 14px; }
.card-num { font-size: 48px; font-weight: 200; letter-spacing: -3px; line-height: 1; }
.card-unit { font-size: 16px; color: #ffffff25; font-weight: 300; }
.card-sub { font-size: 11px; margin-top: 10px; display: flex; align-items: center; gap: 5px; }
.dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.c-green { color: #32d74b; } .dot-green { background: #32d74b; }
.c-red { color: #ff453a; } .dot-red { background: #ff453a; }
.c-yellow { color: #ffd60a; } .dot-yellow { background: #ffd60a; }
.c-dim { color: #ffffff25; } .dot-dim { background: #333; }
.c-blue { color: #0a84ff; } .dot-blue { background: #0a84ff; }

/* 바 카드 */
.bar-card { background: #0d0d0d; border-radius: 20px; padding: 22px 20px; margin-bottom: 12px; }
.bar-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px; }
.bar-label { font-size: 10px; color: #ffffff25; letter-spacing: 1.5px; text-transform: uppercase; }
.bar-val { font-size: 22px; font-weight: 200; letter-spacing: -0.5px; }
.bar-val-sub { font-size: 12px; color: #ffffff25; margin-left: 3px; }
.track { height: 2px; background: #1a1a1a; border-radius: 2px; overflow: hidden; }
.fill { height: 100%; border-radius: 2px; transition: width 0.8s ease; }
.bar-foot { display: flex; justify-content: space-between; margin-top: 10px; }
.bar-foot span { font-size: 11px; color: #ffffff25; }
.bar-foot em { font-style: normal; color: #ffffffcc; }

/* 리스트 */
.list-card { background: #0d0d0d; border-radius: 20px; overflow: hidden; margin-bottom: 12px; }
.list-head { padding: 18px 20px 12px; font-size: 10px; color: #ffffff20; letter-spacing: 2px; text-transform: uppercase; }
.list-item { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; border-top: 1px solid #141414; cursor: pointer; transition: background 0.1s; -webkit-tap-highlight-color: transparent; }
.list-item:active { background: #141414; }
.list-name { font-size: 13px; color: #ffffffaa; font-weight: 300; }
.list-badge { font-size: 11px; padding: 3px 8px; border-radius: 99px; font-weight: 400; margin-right: 4px; }
.badge-red { background: #ff453a18; color: #ff453a; }
.badge-green { background: #32d74b18; color: #32d74b; }
.badge-dim { background: #ffffff08; color: #ffffff40; }
.list-arrow { font-size: 18px; color: #ffffff15; }
.list-item.locked .list-name { color: #0a84ff80; }

.loading { color: #ffffff20; font-size: 13px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-sub">CAMS · Dashboard</div>
  <div class="header-title">오늘 현황</div>
  <div class="header-date" id="dateStr"></div>
</div>

<div class="scroll">

  <div class="grid" id="statGrid">
    <div class="card">
      <div class="card-label">토크 측정</div>
      <div class="card-num" id="torqueCount">—</div>
      <div class="card-sub c-dim" id="torqueSub"><span class="dot dot-dim"></span>로딩 중</div>
    </div>
    <div class="card">
      <div class="card-label">알카 불량</div>
      <div class="card-num" id="alkaCount">—</div>
      <div class="card-sub" id="alkaSub"><span class="dot dot-dim"></span><span class="c-dim">로딩 중</span></div>
    </div>
    <div class="card">
      <div class="card-label">업무일지</div>
      <div class="card-num" id="jisaCount">—</div>
      <div class="card-sub" id="jisaSub"><span class="dot dot-dim"></span><span class="c-dim">로딩 중</span></div>
    </div>
    <div class="card">
      <div class="card-label">이번달 입력</div>
      <div class="card-num" id="alkaMonthCount">—</div>
      <div class="card-sub c-dim" id="alkaMonthSub"><span class="dot dot-dim"></span>로딩 중</div>
    </div>
  </div>

  <div class="bar-card">
    <div class="bar-header">
      <div class="bar-label">알카 월 목표 달성률</div>
      <div class="bar-val"><span id="barPct">—</span><span class="bar-val-sub">%</span></div>
    </div>
    <div class="track"><div class="fill" id="barFill" style="width:0%;background:#0a84ff"></div></div>
    <div class="bar-foot">
      <span><em id="barDone">—</em>건 완료</span>
      <span>잔여 <em id="barLeft">—</em>건 · 목표 <em id="barTarget">155</em></span>
    </div>
  </div>

  <div class="list-card">
    <div class="list-head">도구 바로가기</div>
    <div class="list-item" onclick="goTool(0)">
      <span class="list-name">토크 측정</span>
      <span class="list-arrow">›</span>
    </div>
    <div class="list-item" onclick="goTool(1)">
      <span class="list-name">토크 관리</span>
      <span class="list-arrow">›</span>
    </div>
    <div class="list-item" onclick="goTool(2)">
      <span class="list-name">대차 관리</span>
      <span class="list-arrow">›</span>
    </div>
    <div class="list-item" onclick="goTool(3)">
      <span class="list-name">3정5S</span>
      <span class="list-arrow">›</span>
    </div>
    <div class="list-item" onclick="goTool(4)">
      <span class="list-name">알카 KPI</span>
      <span class="list-arrow">›</span>
    </div>
    <div class="list-item" onclick="goTool(5)">
      <span class="list-name">ALC 정리</span>
      <span class="list-arrow">›</span>
    </div>
    <div class="list-item" onclick="goTool(6)">
      <span class="list-name">컨베어</span>
      <span class="list-arrow">›</span>
    </div>
    <div class="list-item locked" onclick="goTool(7)">
      <span class="list-name">🔒 업무일지</span>
      <span class="list-arrow">›</span>
    </div>
    <div class="list-item locked" onclick="goTool(8)">
      <span class="list-name">🔒 PPTX 캡처</span>
      <span class="list-arrow">›</span>
    </div>
  </div>

</div>

<script>
function goTool(idx) {
  window.parent.postMessage({ type: 'cams_goto', idx }, '*');
}

window.addEventListener('message', e => {
  if (e.data && e.data.type === 'cams_torque_stat') {
    const { thisMonth, total } = e.data;
    document.getElementById('torqueCount').textContent = thisMonth;
    const sub = document.getElementById('torqueSub');
    sub.innerHTML = `<span class="dot dot-blue"></span><span class="c-blue">누계 ${total}건</span>`;
  }
});

function pad(n) { return String(n).padStart(2,'0'); }

function init() {
  const now = new Date();
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('dateStr').textContent =
    `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${days[now.getDay()]}요일`;

  const ym = `${now.getFullYear()}-${pad(now.getMonth()+1)}`;
  const today = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;

  // 알카 데이터
  try {
    const alka = JSON.parse(localStorage.getItem('alka_db_v1') || 'null');
    if (alka) {
      const monthRecs = alka.months && alka.months[ym] ? alka.months[ym] : [];
      const allRecs = Object.values(alka.months || {}).flat();
      const target = alka.targetCount || 155;
      const done = monthRecs.length;
      const pct = Math.round(done / target * 100);
      const left = Math.max(0, target - done);

      document.getElementById('alkaCount').textContent = done;
      const alkaSub = document.getElementById('alkaSub');
      if (done === 0) {
        alkaSub.innerHTML = `<span class="dot dot-green"></span><span class="c-green">이번달 없음</span>`;
      } else if (done >= 10) {
        alkaSub.innerHTML = `<span class="dot dot-red"></span><span class="c-red">누계 ${allRecs.length}건</span>`;
      } else {
        alkaSub.innerHTML = `<span class="dot dot-yellow"></span><span class="c-yellow">누계 ${allRecs.length}건</span>`;
      }

      document.getElementById('alkaMonthCount').textContent = done;
      document.getElementById('alkaMonthSub').innerHTML =
        `<span class="dot dot-dim"></span><span class="c-dim">목표 ${target}건 중</span>`;

      document.getElementById('barPct').textContent = pct;
      document.getElementById('barDone').textContent = done;
      document.getElementById('barLeft').textContent = left;
      document.getElementById('barTarget').textContent = target;
      setTimeout(() => {
        document.getElementById('barFill').style.width = pct + '%';
        document.getElementById('barFill').style.background = pct >= 80 ? '#32d74b' : pct >= 50 ? '#0a84ff' : '#ffd60a';
      }, 100);
    } else {
      document.getElementById('alkaCount').textContent = '—';
      document.getElementById('alkaSub').innerHTML = `<span class="dot dot-dim"></span><span class="c-dim">알카탭 방문 후 표시</span>`;
    }
  } catch(e) {}

  // 업무일지 데이터
  try {
    const jisa = JSON.parse(localStorage.getItem('jisa_history_v1') || '[]');
    const todayRecs = jisa.filter(r => r.date === today);
    const todayItems = todayRecs.reduce((s, r) => s + (r.items ? r.items.length : 0), 0);
    const totalItems = jisa.reduce((s, r) => s + (r.items ? r.items.length : 0), 0);

    document.getElementById('jisaCount').textContent = todayItems;
    const jisaSub = document.getElementById('jisaSub');
    if (todayItems > 0) {
      jisaSub.innerHTML = `<span class="dot dot-blue"></span><span class="c-blue">누계 ${totalItems}건</span>`;
    } else {
      jisaSub.innerHTML = `<span class="dot dot-dim"></span><span class="c-dim">오늘 없음</span>`;
    }
  } catch(e) {}

  // 토크 측정 — 포털에서 iframe에 요청
  window.parent.postMessage({ type: 'cams_request_stat', tool: 'torque' }, '*');
}

init();
setInterval(init, 60000);
</script>
</body>
</html>
